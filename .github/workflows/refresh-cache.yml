name: Refresh B20 Cache

on:
  # Runs every 6 hours. GitHub may delay scheduled workflows under load.
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Number of recent B20 tokens to refresh"
        required: false
        default: "20"
      refresh_url:
        description: "Optional override for the refresh endpoint URL"
        required: false
        default: ""

concurrency:
  group: b20-cache-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Resolve refresh config
        id: config
        env:
          DEFAULT_REFRESH_URL: ${{ secrets.B20_WATCHER_REFRESH_URL }}
          INPUT_REFRESH_URL: ${{ github.event.inputs.refresh_url }}
          INPUT_LIMIT: ${{ github.event.inputs.limit }}
        run: |
          set -euo pipefail

          REFRESH_URL="${INPUT_REFRESH_URL:-$DEFAULT_REFRESH_URL}"
          LIMIT="${INPUT_LIMIT:-20}"

          if [ -z "$REFRESH_URL" ]; then
            echo "B20_WATCHER_REFRESH_URL is missing. Add it as a GitHub Actions secret or pass refresh_url manually." >&2
            exit 1
          fi

          if ! printf '%s' "$LIMIT" | grep -Eq '^[0-9]+$'; then
            echo "limit must be a positive integer." >&2
            exit 1
          fi

          if [ "$LIMIT" -lt 1 ]; then
            echo "limit must be >= 1." >&2
            exit 1
          fi

          if [ "$LIMIT" -gt 20 ]; then
            echo "limit is capped to 20 for scheduled refresh safety. Requested: $LIMIT" >&2
            LIMIT=20
          fi

          echo "refresh_url=$REFRESH_URL" >> "$GITHUB_OUTPUT"
          echo "limit=$LIMIT" >> "$GITHUB_OUTPUT"

      - name: Call refresh endpoint
        env:
          REFRESH_URL: ${{ steps.config.outputs.refresh_url }}
          REFRESH_SECRET: ${{ secrets.B20_WATCHER_REFRESH_SECRET }}
          LIMIT: ${{ steps.config.outputs.limit }}
        run: |
          set -euo pipefail

          if [ -z "$REFRESH_SECRET" ]; then
            echo "B20_WATCHER_REFRESH_SECRET is missing. Add it as a GitHub Actions secret." >&2
            exit 1
          fi

          echo "Calling B20 refresh endpoint with limit=$LIMIT"

          response_file="$(mktemp)"
          http_status="$(curl -sS -o "$response_file" -w "%{http_code}" \
            -X POST "$REFRESH_URL" \
            -H "Content-Type: application/json" \
            -H "x-refresh-secret: $REFRESH_SECRET" \
            -d "{\"limit\": $LIMIT}")"

          network="$(jq -r '.network // "unknown"' "$response_file")"
          tokens="$(jq -r '.tokens // 0' "$response_file")"
          events="$(jq -r '.events // 0' "$response_file")"
          reports="$(jq -r '.reports // 0' "$response_file")"
          partial="$(jq -r '.partial // false' "$response_file")"
          errors_count="$(jq -r '(.errors // []) | length' "$response_file")"
          tokens_checked="$(jq -r '.eventDiff.tokensChecked // 0' "$response_file")"
          tokens_with_new_events="$(jq -r '.eventDiff.tokensWithNewEvents // 0' "$response_file")"
          new_events="$(jq -r '.eventDiff.newEvents // 0' "$response_file")"
          baseline_tokens="$(jq -r '[.eventDiff.byToken[]? | select(.baseline == true)] | length' "$response_file")"

          echo ""
          echo "=== Refresh summary ==="
          echo "HTTP status: $http_status"
          echo "Network: $network"
          echo "Tokens: $tokens"
          echo "Events: $events"
          echo "Reports: $reports"
          echo "Partial: $partial"
          echo "Errors: $errors_count"
          echo "New events: $new_events"
          echo "Tokens with new events: $tokens_with_new_events"
          echo "Tokens checked: $tokens_checked"
          echo "Baseline tokens: $baseline_tokens"

          if [ "$errors_count" -gt 0 ]; then
            echo ""
            echo "First errors:"
            jq -r '(.errors // [])[0:3][] | "- [" + (.stage // "unknown") + "] " + (.tokenAddress // "") + " " + (.message // "")' "$response_file"
          fi

          {
            echo "### B20 Refresh Summary"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| HTTP status | $http_status |"
            echo "| Network | $network |"
            echo "| Tokens | $tokens |"
            echo "| Events | $events |"
            echo "| Reports | $reports |"
            echo "| Partial | $partial |"
            echo "| Errors | $errors_count |"
            echo "| New events | $new_events |"
            echo "| Tokens with new events | $tokens_with_new_events |"
            echo "| Tokens checked | $tokens_checked |"
            echo "| Baseline tokens | $baseline_tokens |"
          } >> "$GITHUB_STEP_SUMMARY"

          echo ""
          echo "Full response JSON:"
          cat "$response_file" | jq .

          if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
            echo "Refresh failed with HTTP status $http_status" >&2
            exit 1
          fi
